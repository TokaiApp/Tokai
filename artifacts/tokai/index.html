<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Tokai — Neuro Dashboard</title>
    <link rel="icon" type="image/png" href="/tokai_logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lexend:wght@400;500;600;700&family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
      /* Reading-text font; swapped to a high-legibility face in Accessibility settings.
         Mono labels keep their own family for the techy brand look. */
      :root { --font-body: 'Rajdhani', sans-serif; }
      html[data-legible="1"] { --font-body: 'Lexend', 'Atkinson Hyperlegible', sans-serif; }
      /* Reduce motion: near-instant transitions/animations + no smooth scrolling */
      html[data-reduce-motion="1"] *,
      html[data-reduce-motion="1"] *::before,
      html[data-reduce-motion="1"] *::after {
        transition-duration: 0.001ms !important;
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
